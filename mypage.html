<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이페이지 · 공간잇다</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-require="auth">
  <header class="header is-scrolled" id="header">
    <div class="header__inner">
      <a href="index.html" class="logo"><span class="logo__dot"></span>공간잇다</a>
      <nav class="header__nav" id="nav">
        <a href="search.html" class="header__link">공간 찾기</a>
        <a href="map.html" class="header__link">지도</a>
        <a href="host.html" class="header__link js-host-nav">호스트 등록</a>
        <span class="header__sep"></span>
        <span class="auth-area" data-authbox></span>
      </nav>
      <button class="hmenu" id="hmenu" aria-label="메뉴"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main class="mp">
    <div class="mp__head">
      <span class="section__kicker">MY PAGE</span>
      <div class="mp__titlerow">
        <h1 class="mp__title" id="mpTitle">마이페이지</h1>
        <button class="btn btn--outline btn--sm" id="mpEdit">정보 수정</button>
      </div>
      <p class="mp__sub" id="mpSub"></p>
    </div>

    <nav class="mp-tabs" id="mpTabs">
      <button class="mp-tab is-active" data-tab="book">예약 내역</button>
      <button class="mp-tab js-host" data-tab="reqs" hidden>예약 요청<span class="mp-tab__badge" id="reqBadge" hidden></span></button>
      <button class="mp-tab" data-tab="fav">찜한 공간</button>
      <button class="mp-tab" data-tab="myrev">내 후기</button>
      <button class="mp-tab" data-tab="inq">1:1 문의</button>
      <button class="mp-tab js-host" data-tab="mine" hidden>내 등록 공간</button>
      <button class="mp-tab js-host" data-tab="settle" hidden>정산</button>
      <button class="mp-tab js-host" data-tab="disc" hidden>공간 관리</button>
    </nav>

    <section class="mp-panel" data-panel="book"><div id="bookList"></div><div class="mp-empty" id="bookEmpty" hidden>아직 예약 내역이 없어요.</div></section>
    <section class="mp-panel" data-panel="fav" hidden><div class="grid" id="favGrid"></div><div class="mp-empty" id="favEmpty" hidden>아직 찜한 공간이 없어요. 마음에 드는 공간에 하트를 눌러보세요.</div></section>
    <section class="mp-panel" data-panel="myrev" hidden><div id="myrevWrap"></div></section>
    <section class="mp-panel" data-panel="inq" hidden><div id="inqWrap"></div></section>
    <section class="mp-panel" data-panel="reqs" hidden><div id="reqList"></div><div class="mp-empty" id="reqEmpty" hidden>받은 예약 요청이 없어요.</div></section>
    <section class="mp-panel" data-panel="mine" hidden><div class="grid" id="mineGrid"></div><div class="mp-empty" id="mineEmpty" hidden>아직 등록한 공간이 없어요. <a href="host.html" style="color:var(--accent);font-weight:700">공간 등록하기</a></div></section>
    <section class="mp-panel" data-panel="settle" hidden><div id="settleWrap"></div></section>
    <section class="mp-panel" data-panel="disc" hidden><div id="discWrap"></div></section>
  </main>

  <footer class="footer"><div class="footer__copy" style="border:none">© 2026 공간잇다 · wylie</div></footer>

  <!-- 모달 (일정변경 · 채팅) -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-mclose></div>
    <div class="modal__card" id="modalCard"></div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="js/icons.js"></script>
  <script src="data/categories.js"></script>
  <script src="data/spaces.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/mypage.js"></script>
</body>
</html>
