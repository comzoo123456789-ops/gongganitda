<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 · 공간잇다</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css?v=20260723" />
</head>
<body class="auth-body">
  <main class="auth-split">
    <aside class="auth-visual">
      <div class="auth-visual__bg" aria-hidden="true"></div>
      <a href="index.html" class="auth-visual__logo"><span class="logo__dot"></span>공간잇다</a>
      <div class="auth-visual__copy">
        <h2>공간부터 장비·케이터링까지<br />한 곳에서 잇다</h2>
        <p>원하는 공간을 찾고, 여러 파트너의 견적을 한 번에 받아보세요.</p>
      </div>
      <div class="auth-visual__foot">★ 4.8 · 검증된 공간·파트너와 함께</div>
    </aside>

    <section class="auth-main">
      <div class="auth-card">
        <a href="index.html" class="auth-back">← 홈으로</a>
        <h1 class="auth-card__title">로그인</h1>
        <p class="auth-card__sub">아이디와 비밀번호로 로그인하세요. 계정 유형에 따라 자동으로 이동합니다.</p>
        <form id="loginForm" novalidate>
          <div class="field">
            <label class="field__label" for="lgId">아이디</label>
            <input type="text" id="lgId" autocomplete="username" placeholder="아이디" />
          </div>
          <div class="field">
            <label class="field__label" for="lgPw">비밀번호</label>
            <input type="password" id="lgPw" autocomplete="current-password" placeholder="비밀번호" />
          </div>
          <p class="auth-err" id="lgErr" hidden></p>
          <button type="submit" class="btn btn--accent btn--lg btn--block">로그인</button>
        </form>
        <div data-kakao-login hidden></div>
        <p class="auth-alt">아직 회원이 아니신가요? <a href="signup.html">회원가입</a></p>
        <p class="auth-demo">데모 로그인 — 호스트 <b>host1</b> · 파트너 <b>vendor1</b> (비번 <b>1234</b>) · 회원은 가입 후 이용</p>
      </div>
    </section>
  </main>

  <script src="js/icons.js?v=20260723"></script>
  <script src="js/config.js?v=20260723"></script>
  <script src="data/categories.js?v=20260723"></script>
  <script src="data/spaces.js?v=20260723"></script>
  <script src="js/auth.js?v=20260723"></script>
  <script src="js/login.js?v=20260723"></script>
  <script src="js/kakao.js?v=20260723"></script>
</body>
</html>
