<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이페이지 · 공간잇다</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css?v=20260723" />
</head>
<body data-require="auth">
  <header class="header is-scrolled" id="header">
    <div class="header__inner">
      <a href="index.html" class="logo"><span class="logo__dot"></span>공간잇다</a>
      <nav class="header__nav" id="nav">
        <a href="search.html" class="header__link">공간 찾기</a>
        <a href="vendors.html" class="header__link">맞춤 업체</a>
        
        <a href="request.html" class="header__link">견적 요청</a>
        <a href="map.html" class="header__link">지도</a>
        <a href="host.html" class="header__link js-host-nav">사업자 등록</a>
        <span class="header__sep"></span>
        <span class="auth-area" data-authbox></span>
      </nav>
      <button class="hmenu" id="hmenu" aria-label="메뉴"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main class="mp">
    <div class="mp__head">
      <span class="section__kicker">MY PAGE</span>
      <div class="mp__titlerow">
        <h1 class="mp__title" id="mpTitle">마이페이지</h1>
        <div class="mp__hactions">
          <button class="btn btn--outline btn--sm" id="mpInq">1:1 문의</button>
          <button class="btn btn--outline btn--sm" id="mpEdit">정보 수정</button>
        </div>
      </div>
      <p class="mp__sub" id="mpSub"></p>
    </div>

    <nav class="mp-tabs" id="mpTabs">
      <button class="mp-tab js-common is-active" data-tab="dash">대시보드</button>
      <!-- 호스트: 예약·공간 관리 우선 -->
      <button class="mp-tab js-host" data-tab="reqs" hidden>예약 요청<span class="mp-tab__badge" id="reqBadge" hidden></span></button>
      <button class="mp-tab js-host" data-tab="disc" hidden>공간 관리</button>
      <button class="mp-tab js-host" data-tab="mine" hidden>내 등록 공간</button>
      <button class="mp-tab js-host" data-tab="hreq" hidden>공간 견적요청<span class="mp-tab__badge" id="hreqBadge" hidden></span></button>
      <button class="mp-tab js-host" data-tab="settle" hidden>정산</button>
      <!-- 파트너 -->
      <button class="mp-tab js-vendor" data-tab="vreq" hidden>견적 요청함<span class="mp-tab__badge" id="vreqBadge" hidden></span></button>
      <button class="mp-tab js-vendor" data-tab="vlink" hidden>연동 현황<span class="mp-tab__badge" id="vlinkBadge" hidden></span></button>
      <button class="mp-tab js-vendor" data-tab="vsettle" hidden>정산</button>
      <button class="mp-tab js-vendor" data-tab="bizinfo" hidden>파트너 정보</button>
      <!-- 회원 -->
      <button class="mp-tab js-mem" data-tab="book">예약 내역</button>
      <button class="mp-tab js-mem" data-tab="rfp">견적 요청</button>
      <button class="mp-tab js-mem" data-tab="fav">찜한 공간</button>
      <button class="mp-tab js-mem" data-tab="recent">최근 본 공간</button>
      <!-- 공통(맨끝) -->
      <button class="mp-tab js-common" data-tab="myrev">내 후기</button>
    </nav>

    <section class="mp-panel" data-panel="dash"><div id="dashWrap"></div></section>
    <section class="mp-panel" data-panel="book" hidden>
      <div class="lf"><span class="lf__t">기간</span><input type="date" id="bkFrom" class="lf__d" /><span class="lf__sep">~</span><input type="date" id="bkTo" class="lf__d" /><button type="button" class="btn btn--soft btn--sm" id="bkReset">전체</button></div>
      <div id="bookList"></div><div class="mp-empty" id="bookEmpty" hidden>조건에 맞는 예약 내역이 없어요.</div>
    </section>
    <section class="mp-panel" data-panel="fav" hidden><div class="grid" id="favGrid"></div><div class="mp-empty" id="favEmpty" hidden>아직 찜한 공간이 없어요. 마음에 드는 공간에 하트를 눌러보세요.</div></section>
    <section class="mp-panel" data-panel="recent" hidden><div class="grid" id="recentGrid"></div><div class="mp-empty" id="recentEmpty" hidden>최근 본 공간이 없어요. 공간을 둘러보면 여기에 모여요.</div></section>
    <section class="mp-panel" data-panel="myrev" hidden><div id="myrevWrap"></div></section>
    <section class="mp-panel" data-panel="hreq" hidden><div id="hreqList"></div><div class="mp-empty" id="hreqEmpty" hidden></div></section>
    <section class="mp-panel" data-panel="reqs" hidden><div id="reqList"></div><div class="mp-empty" id="reqEmpty" hidden>받은 예약 요청이 없어요.</div></section>
    <section class="mp-panel" data-panel="mine" hidden><div class="rfp-actions"><a href="host.html" class="btn btn--accent btn--sm">+ 새 공간 등록</a></div><div class="grid" id="mineGrid"></div><div class="mp-empty" id="mineEmpty" hidden>아직 등록한 공간이 없어요. <a href="host.html" style="color:var(--accent);font-weight:700">공간 등록하기</a></div></section>
    <section class="mp-panel" data-panel="settle" hidden><div id="settleWrap"></div></section>
    <section class="mp-panel" data-panel="disc" hidden><div id="discWrap"></div></section>
    <section class="mp-panel" data-panel="rfp" hidden>
      <div class="rfp-actions"><a href="request.html" class="btn btn--outline btn--sm">+ 견적 요청</a><a href="vendors.html" class="btn btn--outline btn--sm">맞춤 업체 찾아 직접 요청</a></div>
      <div class="rfp-subtabs" id="rfpSubtabs">
        <button class="rfp-subtab is-active" data-sub="auction">🔨 견적 <span class="rfp-subtab__n" id="rfpCntAuc">0</span></button>
        <button class="rfp-subtab" data-sub="direct">🎯 파트너 직접 견적 <span class="rfp-subtab__n" id="rfpCntDir">0</span></button>
      </div>
      <div class="lf"><span class="lf__t">이용일</span><input type="date" id="rfpFrom" class="lf__d" /><span class="lf__sep">~</span><input type="date" id="rfpTo" class="lf__d" /><button type="button" class="btn btn--soft btn--sm" id="rfpReset">전체</button></div>
      <div id="rfpList"></div>
      <div class="mp-empty" id="rfpEmpty" hidden></div>
    </section>
    <section class="mp-panel" data-panel="vreq" hidden><div id="vreqList"></div><div class="mp-empty" id="vreqEmpty" hidden>들어온 요청이 없어요.</div></section>
    <section class="mp-panel" data-panel="vlink" hidden><div id="vlinkWrap"></div></section>
    <section class="mp-panel" data-panel="vsettle" hidden><div id="vsettleWrap"></div></section>
    <section class="mp-panel" data-panel="bizinfo" hidden><div id="bizWrap"></div></section>
  </main>

  <footer class="footer"><div class="footer__copy" style="border:none"><a href="help.html?tab=guide" style="color:var(--muted);font-weight:600">이용 방법</a> · <a href="help.html?tab=booking" style="color:var(--muted);font-weight:600">예약 안내</a> · <a href="help.html?tab=faq" style="color:var(--muted);font-weight:600">자주 묻는 질문</a> &nbsp;|&nbsp; © 2026 공간잇다 · wylie</div></footer>

  <!-- 모달 (일정변경 · 채팅) -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-mclose></div>
    <div class="modal__card" id="modalCard"></div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="js/icons.js?v=20260723"></script>
  <script src="data/categories.js?v=20260723"></script>
  <script src="data/spaces.js?v=20260723"></script>
  <script src="data/packages.js?v=20260723"></script>
  <script src="js/ops.js?v=20260723"></script>
  <script src="js/auth.js?v=20260723"></script>
  <script src="js/live.js?v=20260723"></script>
  <script src="js/mypage.js?v=20260723"></script>
</body>
</html>
