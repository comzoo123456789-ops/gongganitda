<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파트너 견적 요청 · 공간잇다</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css?v=20260723" />
</head>
<body data-require="auth">
  <header class="header is-scrolled" id="header">
    <div class="header__inner">
      <a href="index.html" class="logo"><span class="logo__dot"></span>공간잇다</a>
      <nav class="header__nav" id="nav">
        <a href="search.html" class="header__link">공간 찾기</a>
        <a href="vendors.html" class="header__link">맞춤 업체</a>
        
        <a href="request.html" class="header__link">견적 요청</a>
        <a href="map.html" class="header__link">지도</a>
        <a href="host.html" class="header__link js-host-nav">사업자 등록</a>
        <span class="header__sep"></span>
        <span class="auth-area" data-authbox></span>
      </nav>
      <button class="hmenu" id="hmenu" aria-label="메뉴"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main class="hostreg">
    <div class="hostreg__head">
      <span class="section__kicker">DIRECT REQUEST</span>
      <h1 class="hostreg__title">파트너에 견적 요청</h1>
      <p class="hostreg__sub">선택한 파트너에게 <b>1:1로 직접</b> 견적을 요청합니다. (공개 견적 요청과 별개)</p>
    </div>

    <div class="rq-venue" id="dqVendor" hidden></div>

    <form class="hf" id="dqForm" novalidate>
      <div class="hf-row">
        <div class="hf-field"><label class="hf-label">이용 날짜 <i>*</i></label><input type="date" id="dqDate" /></div>
        <div class="hf-field"><label class="hf-label">지역 <i>*</i></label><select id="dqRegion"></select></div>
      </div>
      <div class="hf-row">
        <div class="hf-field"><label class="hf-label">휴대폰 번호 <i>*</i></label><input type="tel" id="dqPhone" placeholder="010-0000-0000" /><span class="hf-hint">파트너가 연락할 연락처예요. 채팅이 어려우면 전화로 상담해요.</span></div>
        <div class="hf-field"><label class="hf-label">총 예산 (원, 선택)</label><input type="number" id="dqBudget" min="0" step="10000" placeholder="예: 300000" /><span class="hf-hint" id="dqBudgetHint"></span></div>
      </div>
      <div class="hf-field"><label class="hf-label">요청 사항 <i>*</i></label><textarea id="dqDetail" rows="4" placeholder="필요한 품목·수량·사양·이용 기간 등을 자세히 적어주세요. (예: 소니 A7M4 2대, 조명 키트 1세트, 1일 대여)"></textarea></div>
      <label class="co-consent" id="dqConsentWrap"><input type="checkbox" id="dqConsent" /><span><b>[필수]</b> 개인정보 제3자 제공 동의 — 이름·연락처가 해당 <b>파트너</b>에게 제공되는 것에 동의합니다. <a href="#" data-consent-detail>자세히</a></span></label>
      <p class="hf-err" id="dqErr" hidden></p>
      <button type="submit" class="btn btn--accent btn--lg btn--block" id="dqSubmit">견적 요청 보내기</button>
      <p class="hf-note">요청은 이 브라우저에 저장되고, 선택한 파트너 계정에만 알림이 갑니다.</p>
    </form>
  </main>

  <footer class="footer"><div class="footer__copy" style="border:none"><a href="help.html?tab=guide" style="color:var(--muted);font-weight:600">이용 방법</a> · <a href="help.html?tab=booking" style="color:var(--muted);font-weight:600">예약 안내</a> · <a href="help.html?tab=faq" style="color:var(--muted);font-weight:600">자주 묻는 질문</a> &nbsp;|&nbsp; © 2026 공간잇다 · wylie</div></footer>
  <div class="toast" id="toast" hidden></div>

  <script src="js/icons.js?v=20260723"></script>
  <script src="data/categories.js?v=20260723"></script>
  <script src="data/spaces.js?v=20260723"></script>
  <script src="js/auth.js?v=20260723"></script>
  <script src="js/direct.js?v=20260723"></script>
</body>
</html>
