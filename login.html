<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 · 공간잇다</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header is-scrolled">
    <div class="header__inner">
      <a href="index.html" class="logo"><span class="logo__dot"></span>공간잇다</a>
      <nav class="header__nav" id="nav"><a href="index.html" class="header__link">← 홈</a></nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-card__title">로그인</h1>
      <p class="auth-card__sub">공간잇다에 오신 것을 환영합니다.</p>
      <form id="loginForm" novalidate>
        <div class="field">
          <label class="field__label" for="lgId">아이디</label>
          <input type="text" id="lgId" autocomplete="username" placeholder="아이디" />
        </div>
        <div class="field">
          <label class="field__label" for="lgPw">비밀번호</label>
          <input type="password" id="lgPw" autocomplete="current-password" placeholder="비밀번호" />
        </div>
        <p class="auth-err" id="lgErr" hidden></p>
        <button type="submit" class="btn btn--accent btn--lg btn--block">로그인</button>
      </form>
      <p class="auth-alt">아직 회원이 아니신가요? <a href="signup.html">회원가입</a></p>
      <p class="auth-demo">데모 계정 — 게스트 <b>guest / 1234</b> · 호스트 <b>host / 1234</b></p>
    </div>
  </main>

  <script src="data/categories.js"></script>
  <script src="data/spaces.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
