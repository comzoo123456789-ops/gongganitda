<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 · 공간잇다</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css?v=20260723" />
</head>
<body>
  <header class="header is-scrolled">
    <div class="header__inner">
      <a href="index.html" class="logo"><span class="logo__dot"></span>공간잇다</a>
      <nav class="header__nav" id="nav"><a href="index.html" class="header__link">← 홈</a></nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-card__title">회원가입</h1>
      <p class="auth-card__sub">공간 예약·견적을 이용할 <b>일반 회원</b> 가입이에요.</p>

      <form id="signupForm" novalidate>
        <div class="field">
          <label class="field__label" for="suNick">닉네임</label>
          <input type="text" id="suNick" placeholder="예: 지훈 (→ '지훈 회원'으로 표시)" />
        </div>
        <div class="field">
          <label class="field__label" for="suId">아이디</label>
          <input type="text" id="suId" autocomplete="username" placeholder="아이디" />
        </div>
        <div class="field">
          <label class="field__label" for="suPw">비밀번호</label>
          <input type="password" id="suPw" autocomplete="new-password" placeholder="영문·숫자·특수문자 조합 8자 이상" />
          <span class="field__hint" id="suPwHint">영문·숫자·특수문자를 모두 포함해 8자 이상 입력하세요.</span>
        </div>
        <div class="field">
          <label class="field__label" for="suEmail">이메일</label>
          <input type="email" id="suEmail" placeholder="이메일" />
        </div>
        <label class="su-agree" id="suAgreeWrap">
          <input type="checkbox" id="suAgree" />
          <span><b class="su-req">[필수]</b> <button type="button" class="su-link" data-legal="guest">서비스 이용약관</button> 및 <button type="button" class="su-link" data-legal="privacy">개인정보 처리방침</button>에 동의합니다.</span>
        </label>
        <label class="su-agree su-agree--opt">
          <input type="checkbox" id="suMktg" />
          <span><b class="su-opt">[선택]</b> 마케팅 정보 수신 동의 <button type="button" class="su-link" data-legal="marketing">자세히 보기</button> — 혜택·이벤트·할인 소식을 알림으로 받아볼게요. (미동의해도 가입할 수 있어요)</span>
        </label>
        <p class="auth-err" id="suErr" hidden></p>
        <button type="submit" class="btn btn--accent btn--lg btn--block">가입하기</button>
      </form>
      <div data-kakao-login hidden></div>
      <p class="auth-alt">이미 회원이신가요? <a href="login.html">로그인</a></p>
      <p class="auth-demo">공간을 빌려주거나 서비스를 제공하시나요?<br /><a href="business.html" class="auth-demo__link">사업자 등록 →</a></p>
    </div>
  </main>

  <script src="js/config.js?v=20260723"></script>
  <script src="data/categories.js?v=20260723"></script>
  <script src="data/spaces.js?v=20260723"></script>
  <script src="js/auth.js?v=20260723"></script>
  <script src="js/signup.js?v=20260723"></script>
  <script src="js/kakao.js?v=20260723"></script>
</body>
</html>
