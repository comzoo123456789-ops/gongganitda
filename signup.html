<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 · 공간잇다</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header is-scrolled">
    <div class="header__inner">
      <a href="index.html" class="logo"><span class="logo__dot"></span>공간잇다</a>
      <nav class="header__nav" id="nav"><a href="index.html" class="header__link">← 홈</a></nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-card__title">회원가입</h1>
      <p class="auth-card__sub">회원 유형을 선택하세요.</p>

      <div class="auth-tabs" id="suTabs">
        <button type="button" class="auth-tab is-active" data-role="guest">👤 일반 회원</button>
        <button type="button" class="auth-tab" data-role="host">🏠 호스트 회원</button>
      </div>

      <form id="signupForm" novalidate>
        <div class="field">
          <label class="field__label" for="suNick">닉네임</label>
          <input type="text" id="suNick" placeholder="예: 지훈 (→ '지훈 회원' / '지훈 호스트'로 표시)" />
        </div>
        <div class="field">
          <label class="field__label" for="suId">아이디</label>
          <input type="text" id="suId" autocomplete="username" placeholder="아이디" />
        </div>
        <div class="field">
          <label class="field__label" for="suPw">비밀번호</label>
          <input type="password" id="suPw" autocomplete="new-password" placeholder="비밀번호" />
        </div>
        <div class="field">
          <label class="field__label" for="suEmail">이메일</label>
          <input type="email" id="suEmail" placeholder="이메일" />
        </div>
        <p class="field__hint" id="suHostHint" hidden>호스트로 가입하면 공간을 등록해 대관 수익을 만들 수 있어요.</p>
        <p class="auth-err" id="suErr" hidden></p>
        <button type="submit" class="btn btn--accent btn--lg btn--block">가입하기</button>
      </form>
      <p class="auth-alt">이미 회원이신가요? <a href="login.html">로그인</a></p>
    </div>
  </main>

  <script src="data/categories.js"></script>
  <script src="data/spaces.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
